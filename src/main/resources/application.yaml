server:
  port: ${APPLICATION_PORT}
  host: ${APPLICATION_HOST}
spring:
  config:
    import: optional:file:.env[.properties]
  application:
    jwt:
      secret-key: ${SECRET_KEY}
      access-token-exp: ${ACCESS_TOKEN_EXP}
      refresh-token-exp: ${ACCESS_TOKEN_EXP}
    name: ${APPLICATION_NAME}
    admin-generate:
      email: ${ADMIN_EMAIL}
      password: ${ADMIN_PASSWORD}
      first-name: ${ADMIN_FIRST_NAME}
      last-name: ${ADMIN_LAST_NAME}
    store-generate:
      name: ${STORE_NAME:Main Store}
      description: ${STORE_DESCRIPTION:}
      location: ${STORE_LOCATION:}
      support-email: ${STORE_SUPPORT_EMAIL:}
      support-phone-number: ${STORE_SUPPORT_PHONE_NUMBER:}
      is-active: ${STORE_IS_ACTIVE:true}
    cors-urls: ${CORS_URLS}
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_DATASOURCE}
    username: ${DB_USERNAME}
    password: ${DB_PW}
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging:
  level:
    root: info
  file:
    name: ${LOG_FILE:./file-storage/logs/backend.log}

app:
  file-storage-path: ${FILE_PATH:./file-storage}
