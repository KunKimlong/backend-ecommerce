databaseChangeLog:
  - context: v1.2.0
  - changeSet:
      id: 1774973992378
      author: Punlith Kay
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: stores
      changes:
        - createTable:
            tableName: stores
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: asset_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_store_asset
                    references: assets(id)
              - column:
                  name: name
                  type: varchar(255)
              - column:
                  name: description
                  type: text
              - column:
                  name: location
                  type: varchar(255)
              - column:
                  name: support_email
                  type: varchar(255)
              - column:
                  name: support_phone_number
                  type: varchar(255)
              - column:
                  name: is_active
                  type: boolean
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: created_by
                  type: bigint
                  constraints:
                    foreignKeyName: fk_store_created_by
                    references: users(id)
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: updated_by
                  type: bigint
                  constraints:
                    foreignKeyName: fk_store_updated_by
                    references: users(id)
