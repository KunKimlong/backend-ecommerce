  - changeSet:
      id: 1772204014911-1
      author: KimLong Kun
      changes:
        - createTable:
            tableName: product_assets
            columns:
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: asset_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: product_assets
            columnNames: product_id, asset_id
            constraintName: pk_product_assets

        - addForeignKeyConstraint:
            baseTableName: product_assets
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: id
            constraintName: fk_product_assets_product
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: product_assets
            baseColumnNames: asset_id
            referencedTableName: assets
            referencedColumnNames: id
            constraintName: fk_product_assets_asset
            onDelete: CASCADE

        - createIndex:
            tableName: product_assets
            indexName: idx_product_assets_product
            columns:
              - column:
                  name: product_id

        - createIndex:
            tableName: product_assets
            indexName: idx_product_assets_asset
            columns:
              - column:
                  name: asset_id
