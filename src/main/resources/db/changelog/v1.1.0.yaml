databaseChangeLog:
  - context: v1.1.0
  - changeSet:
      id: 1773758068045-1
      author: KimLong KUN
      changes:
        - createTable:
            tableName: banners
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: label
                  type: varchar(100)
              - column:
                  name: header_label
                  type: varchar(50)
              - column:
                  name: type
                  type: varchar(50)
              - column:
                  name: description
                  type: text
              - column:
                  name: button_name
                  type: varchar(20)
              - column:
                  name: product_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_banner_product
                    references: products(id)
              - column:
                  name: asset_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_banner_asset
                    references: assets(id)
              - column:
                  name: start_at
                  type: timestamp
              - column:
                  name: end_at
                  type: timestamp
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: created_by
                  type: bigint
                  constraints:
                    foreignKeyName: fk_created_by
                    references: users(id)
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: updated_by
                  type: bigint
                  constraints:
                    foreignKeyName: fk_updated_by
                    references: users(id)
  - changeSet:
      id: 1774685278918-1
      author: KimLong Kun
      changes:
        - createTable:
            tableName: banner_types
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(100)
  - changeSet:
      id: 1774685278918-2
      author: KimLong Kun
      changes:
        - sqlFile:
            path: ./db/sql/banner_default_value.sql
  - changeSet:
      id: 1774685278918-3
      author: KimLong Kun
      changes:
        - dropColumn:
            tableName: banners
            columns:
              - column:
                  name: type
        - addColumn:
            tableName: banners
            columns:
              - column:
                  name: banner_type_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_banner_banner_type
                    references: banner_types(id)
  - changeSet:
      id: 1776324769392-1
      author: KimLong Kun
      changes:
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: category_id
            constraintName: fk_product_category
            referencedTableName: categories
            referencedColumnNames: id
  - changeSet:
      id: 1776324769392-2
      author: KimLong Kun
      changes:
        - sqlFile:
            path: ./db/sql/update_assets_set_asset_type_product_for_null.sql
  - changeSet:
      id: 1776324769392-3
      author: KimLong Kun
      changes:
        - sqlFile:
            path: ./db/sql/insert_non_exist_admin_in_table_employees.sql
  - changeSet:
      id: 1776324769392-4
      author: KimLong Kun
      changes:
        - sqlFile:
            path: ./db/sql/update_numeric_value_in_gender_to_string.sql
  - changeSet:
      id: 1776410973318-1
      author: KimLong Kun
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: asset_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_user_asset
                    references: assets(id)
  - changeSet:
      id: 1776410973318-2
      author: KimLong Kun
      changes:
        - sqlFile:
            path: ./db/sql/migrate_asset_id_to_users.sql
  - changeSet:
      id: 1776410973318-3
      author: KimLong Kun
      changes:
        - dropForeignKeyConstraint:
            baseTableName: employees
            constraintName: fk_employee_asset
        - dropColumn:
            tableName: employees
            columnName: asset_id