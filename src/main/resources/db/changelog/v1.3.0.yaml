databaseChangeLog:
  - context: v1.3.0
  - changeSet:
      id: 1782056415846-1
      author: Kimlong KUN
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: created_by
                  type: bigint
                  constraints:
                    foreignKeyName: fk_roles_created_by
                    references: users(id)
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: updated_by
                  type: bigint
                  constraints:
                    foreignKeyName: fk_roles_updated_by
                    references: users(id)
  - changeSet:
      id: 1782056415846-2
      author: Kimlong KUN
      changes:
        - createTable:
            tableName: permissions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: varchar(255)
              - column:
                  name: module
                  type: varchar(50)
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: created_by
                  type: bigint
                  constraints:
                    foreignKeyName: fk_permissions_created_by
                    references: users(id)
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: updated_by
                  type: bigint
                  constraints:
                    foreignKeyName: fk_permissions_updated_by
                    references: users(id)
  - changeSet:
      id: 1782056415846-3
      author: Kimlong KUN
      changes:
        - createTable:
            tableName: role_permissions
            columns:
              - column:
                  name: role_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: permission_id
                  type: bigint
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: role_permissions
            columnNames: role_id, permission_id
            constraintName: pk_role_permissions
        - addForeignKeyConstraint:
            baseTableName: role_permissions
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_rp_role
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: role_permissions
            baseColumnNames: permission_id
            referencedTableName: permissions
            referencedColumnNames: id
            constraintName: fk_rp_permission
            onDelete: CASCADE
  - changeSet:
      id: 1782056415846-4
      author: Kimlong KUN
      changes:
        - createTable:
            tableName: user_roles
            columns:
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: bigint
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_roles
            columnNames: user_id, role_id
            constraintName: pk_user_roles
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_ur_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_ur_role
            onDelete: CASCADE
  - changeSet:
      id: 1782056415846-5
      author: Kimlong KUN
      changes:
        - sqlFile:
            path: ./db/sql/insert_rbac_default_data.sql
  - changeSet:
      id: 1782056415846-6
      author: Kimlong KUN
      changes:
        - sqlFile:
            path: ./db/sql/migrate_existing_user_roles.sql
  - changeSet:
      id: 1782056415846-7
      author: Kimlong KUN
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: phone
                  type: varchar(20)
              - column:
                  name: join_date
                  type: date
  - changeSet:
      id: 1782056415846-8
      author: Kimlong KUN
      changes:
        - sql:
            sql: |
              UPDATE users u
              SET phone = e.phone,
                  join_date = e.join_date
              FROM employees e
              WHERE e.user_id = u.id;
  - changeSet:
      id: 1782056415846-9
      author: Kimlong KUN
      changes:
        - dropTable:
            tableName: employees
